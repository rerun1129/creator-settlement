spring:
  application:
    name: creator-settlement
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/creator_settlement?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
    show-sql: false

server:
  port: ${SERVER_PORT:9090}
