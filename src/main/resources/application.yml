spring:
  application:
    name: creator-settlement
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/creator_settlement?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
    open-in-view: false
    show-sql: false

server:
  port: ${SERVER_PORT:9090}
  tomcat:
    threads:
      max: 400
    accept-count: 200
